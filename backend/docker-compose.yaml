services:
  db:
    image: postgres:17
    restart: always
    shm_size: 128mb
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:5
    restart: always
    ports:
      - 3400:8080
    environment:
      TOKEN_SECRET: ${TOKEN_SECRET}

  minio:
      image: minio/minio:latest
      command: server /data --console-address ":9001"
      restart: unless-stopped
      environment:
        MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
        MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin12}
      ports:
        - "${MINIO_API_PORT:-9000}:9000"
        - "${MINIO_CONSOLE_PORT:-9001}:9001"
      volumes:
        - minio_data:/data

  minio-init:
      image: minio/mc:latest
      depends_on:
        minio:
          condition: service_started
      volumes:
        - ./mockdata:/mockdata:ro
      entrypoint: ["/bin/sh", "-c"]
      command:
        - |
          set -eu
          echo "Waiting for MinIO..."
          until mc alias set local http://minio:9000 "$$MINIO_ACCESS_KEY" "$$MINIO_SECRET_KEY" 2>/dev/null; do sleep 2; done
          mc mb -p "local/$$MINIO_BUCKET_NAME" 2>/dev/null || true
          if [ -d /mockdata ] && [ -n "$$(ls -A /mockdata 2>/dev/null)" ]; then
            echo "Uploading mockdata to $$MINIO_BUCKET_NAME/mockdata/ ..."
            mc mirror --overwrite /mockdata/ "local/$$MINIO_BUCKET_NAME/mockdata/"
            mc anonymous set download "local/$$MINIO_BUCKET_NAME/mockdata"
            echo "Mockdata upload complete."
          else
            echo "No files in /mockdata; run: node backend/scripts/generate-mockdata-placeholders.mjs"
          fi
          echo "Allowing public read on upload prefixes (local dev only)..."
          mc anonymous set download "local/$$MINIO_BUCKET_NAME/user-profile-picture" || true
          mc anonymous set download "local/$$MINIO_BUCKET_NAME/pet-profile-picture" || true
          mc anonymous set download "local/$$MINIO_BUCKET_NAME/ngo-logos" || true
      environment:
        MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
        MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin12}
        MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-home4strays}
      restart: "no"

volumes:
  minio_data: 
  postgres_data: 